name: Monitor Descargas
on:
  schedule:
    - cron: '*/30 * * * *' # Se ejecuta cada 30 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente si quieres probar

jobs:
  check-downloads:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verificar y Notificar
        env:
          REPO: "${{ github.repository }}"
          NTFY_URL: "https://ntfy.sh/used_notificactions" # Cambia esto
        run: |
          # 1. Obtener descargas actuales de la primera Release
          # Usamos jq para extraer el download_count del primer asset
          TOTAL=$(curl -s "https://api.github.com/repos/$REPO/releases" | jq '.[0].assets[0].download_count')
          
          # 2. Leer valor anterior
          if [ -f last_download_count.txt ]; then
            PREV=$(cat last_download_count.txt)
          else
            PREV=0
          fi
          
          # 3. Comparar
          if [ "$TOTAL" -gt "$PREV" ]; then
            NUEVAS=$((TOTAL - PREV))
            curl -d "¡$NUEVAS nuevas descargas! Total actual: $TOTAL" $NTFY_URL
            echo "$TOTAL" > last_download_count.txt
            
            # 4. Guardar cambios en el repo para la próxima vez
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add last_download_count.txt
            git commit -m "Actualizar contador de descargas: $TOTAL"
            git push
          else
            echo "No hay nuevas descargas. ($TOTAL vs $PREV)"
          fi
